        .modal-content { background: white; padding: 30px; border-radius: 25px; text-align: center; max-width: 320px; }
        .sos-btn { position: fixed; bottom: 20px; right: 20px; background: #e11d48; color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; z-index: 1000; animation: pulse 2s infinite; border: 3px solid white; cursor: pointer; }

                </select>
            </div>

                <select id="tDist" onchange="updateBlocks('t')" required>
                    <option value="">Drop District</option>
                </select>
                <select id="tBlock" required>
                    <option value="">Drop Block</option>
                </select>
            </div>
            <input type="date" id="searchDate" required>
            <button type="submit" class="btn-search">Search Safar</button>

    </div>

</div>

<div class="sos-btn" onclick="window.location.href='tel:100'">SOS</div>

/* -------------------------------
   FIREBASE INIT
--------------------------------*/
const firebaseConfig = {
  apiKey: "AIzaSyDUoVj4rbMh_6qeVF9LbSYctR_G-zbNYkM",
  authDomain: "ridepartner-safarsaathi-9ccb2.firebaseapp.com",
  projectId: "ridepartner-safarsaathi-9ccb2",
  storageBucket: "ridepartner-safarsaathi-9ccb2.firebasestorage.app",
  messagingSenderId: "79836817761",
  appId: "1:79836817761:web:d59c72958158931868fd20"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* -------------------------------
   AUTH CHECK & DROPDOWNS
--------------------------------*/
firebase.auth().onAuthStateChanged((user) => {
    if (!user) {
        alert("Safar dhoondne ke liye login karna anivarya hai.");
        window.location.href = "login.html"; 
    } else {
        initDropdowns();
    }
});

function initDropdowns() {
    const fD = document.getElementById('fDist');
    const tD = document.getElementById('tDist');
    Object.keys(locationData).sort().forEach(d => {
        let opt = `<option value="${d}">${d}</option>`;
        fD.innerHTML += opt;
        tD.innerHTML += opt;
    });
    document.getElementById('searchDate').min = new Date().toISOString().split('T')[0];
}

function updateBlocks(type) {
    const dist = document.getElementById(type + 'Dist').value;
    const blockSel = document.getElementById(type + 'Block');
    blockSel.innerHTML = '<option value="">Block</option>';
    if (locationData[dist]) {
        locationData[dist].sort().forEach(b => {
            blockSel.innerHTML += `<option value="${b}">${b}</option>`;
        });
    }
}

/* -------------------------------
   SEARCH LOGIC
--------------------------------*/

// --- YAHAN SE REPLACE KAREIN ---

// 1. Search Form Submit hone par
document.getElementById('searchForm').onsubmit = (e) => {
    e.preventDefault();
    const fDist = document.getElementById('fDist').value;
    const fBlock = document.getElementById('fBlock').value;
    const tDist = document.getElementById('tDist').value;
    const tBlock = document.getElementById('tBlock').value;
    const date = document.getElementById('searchDate').value;
    
    // Rides dhoondna shuru karein
    setupLiveRides(fDist, fBlock, tDist, tBlock, date);
};

// 2. Rides ko Live dhoondne ka logic
function setupLiveRides(fDist, fBlock, tDist, tBlock, date) {
    const user = firebase.auth().currentUser;
    const resultsDiv = document.getElementById('rideResults');
    const titleDiv = document.getElementById('resultsTitle');

    resultsDiv.innerHTML = '<p style="text-align:center; padding:20px;">🔍 Safar dhoond rahe hain...</p>';

    // Purana listener clear karein agar koi chal raha ho
    if (window.rideListener) window.rideListener();

    // Database se match hone wali rides uthayein
    window.rideListener = db.collection("rides")
        .where("fromDist", "==", fDist)
        .where("fromBlock", "==", fBlock)
        .where("toDist", "==", tDist)
        .where("toBlock", "==", tBlock)
        .where("date", "==", date)
        .where("status", "==", "Active") // Sabse zaroori: Post page se match hona chahiye
        .onSnapshot(snap => {
            if (!snap.empty) {
                // Sirf dusre drivers ki ride dikhayein (apni nahi)
                const filtered = snap.docs.filter(doc => doc.data().driverId !== user.uid);
                
                if(filtered.length > 0) {
                    renderRides(filtered, "🎯 Aapke Route ke Live Safar:");
                } else {
                    resultsDiv.innerHTML = '<p style="text-align:center; color:gray; padding:20px;">Aapne khud ye ride post ki hai, isliye yahan nahi dikhegi. "My Rides" check karein.</p>';
                }
            } else {
                // Agar match na mile toh global active rides dikhayein
                fetchGlobalRides(user.uid);
            }
        }, err => {
            console.error("Firebase Error:", err);
            resultsDiv.innerHTML = '<p style="color:red; text-align:center;">Kuch technical galti hui hai.</p>';
        });
}

// 3. Agar specific route na mile toh kuch rides dikhane ke liye
async function fetchGlobalRides(uid) {
    const resultsDiv = document.getElementById('rideResults');
    const snap = await db.collection("rides")
        .where("status", "==", "Active")
        .limit(5)
        .get();
    
    const otherFiltered = snap.docs.filter(doc => doc.data().driverId !== uid);
    
    if(otherFiltered.length > 0) {
        renderRides(otherFiltered, "📍 Filhaal ye safar mil rahe hain:");
    } else {
        resultsDiv.innerHTML = '<p style="text-align:center; color:gray; padding:20px;">Abhi koi bhi safar active nahi hai. Thodi der baad check karein.</p>';
    }
}

// 4. Rides ko screen par dikhane ke liye (Render Function)
function renderRides(snapshotOrArray, title) {
    const resDiv = document.getElementById('rideResults');
    const titleDiv = document.getElementById('resultsTitle');
    
    titleDiv.innerText = title;
    titleDiv.style.display = "block";
    resDiv.innerHTML = "";

    snapshotOrArray.forEach(doc => {
        const r = doc.data ? doc.data() : doc;
        const rid = doc.id;
        
        // Fare calculation (Commission ke saath)
        const displayFare = r.totalFare || Math.round(r.driverFare * 1.15);
        const genderIcon = r.gender === "Male" ? "♂️" : "♀️";

        resDiv.innerHTML += `
            <div class="ride-item" onclick="window.location.href='ride-details.html?id=${rid}'">
                <div class="fare-badge">₹${displayFare}</div>
                <div style="font-weight: 800; font-size: 16px;">
                    ${genderIcon} ${r.driverName} 
                    <span style="font-size: 10px; background: #f0f0f0; padding: 2px 6px; border-radius: 5px; margin-left: 5px;">
                        ${r.gender}
                    </span>
                </div>
                <div style="font-size: 12px; color: #64748B; margin-top: 8px;">
                    <i class="fas fa-car" style="color:var(--teal-blue)"></i> <b>${r.vehicle}</b> <br>
                    <i class="fas fa-clock" style="color:var(--teal-blue)"></i> Time: ${r.timeSlot} <br>
                    <i class="fas fa-chair" style="color:var(--teal-blue)"></i> Seats: <b>${r.availableSeats}</b>
                </div>
                <div style="margin-top: 10px; border-top: 1px solid #f0f0f0; padding-top: 8px; font-size: 11px; color: var(--accent);">

<i class="fas fa-map-marker-alt"></i> 
<b>Pickup:</b> ${r.pickupPoint}, ${r.fromBlock}, ${r.fromDist}

<br>

<i class="fas fa-flag-checkered"></i> 
<b>Drop:</b> ${r.toBlock}, ${r.toDist}

</div>
            </div>`;
    });
}
// --- YAHAN TAK ---
        

function showMessage(msg) {
    document.getElementById('modalMsg').innerText = msg;
    document.getElementById('noRideModal').style.display = 'flex';
}

function closeModal() {
    document.getElementById('noRideModal').style.display = 'none';
